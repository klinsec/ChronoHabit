
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ChronoHabit</title>
    
    <!-- Android / Standard PWA -->
    <link rel="icon" href="./icon-192.png" type="image/png">
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#1e1e1e" />

    <!-- iOS / iPhone Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ChronoHabit">
    
    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="./icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="./icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="./icon-192.png">

    <style>
      body { background-color: #121212; }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
  </head>
  <body class="bg-bkg text-on-bkg antialiased overflow-hidden select-none">
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            console.log('Unregistering SW:', registration);
            registration.unregister();
          }
          if(registrations.length > 0) {
             console.log('Service Workers unregistered. Reloading page to clear cache...');
             // Optional: window.location.reload(); // Be careful with loops
          }
        });
      }
    </script>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
